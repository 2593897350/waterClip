services:
  web:
    build: ./web
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
  api:
    build: ./api
    ports: ["8080:8080"]
    environment:
      PROCESSOR_BASE_URL: http://processor:8000
    volumes:
      - ./var:/app/var
  processor:
    build: ./processor
    ports: ["8000:8000"]
    volumes:
      - ./var:/app/var
