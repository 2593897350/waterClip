services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
    ports: ["${WEB_PORT:-3000}:3000"]
    environment:
      INTERNAL_API_PROXY_TARGET: ${INTERNAL_API_PROXY_TARGET:-http://api:8080}
    depends_on:
      - api
    restart: unless-stopped
  api:
    build:
      context: ./api
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    expose: ["8080"]
    environment:
      API_ADDRESS: ${API_ADDRESS:-:8080}
      PROCESSOR_BASE_URL: ${PROCESSOR_BASE_URL:-http://processor:8000}
    depends_on:
      - processor
    restart: unless-stopped
    volumes:
      - ./var:/app/var:Z
  processor:
    build:
      context: ./processor
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    expose: ["8000"]
    restart: unless-stopped
    volumes:
      - ./var:/app/var:Z
