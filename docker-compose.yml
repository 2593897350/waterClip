services:
  web:
    build: ./web
    ports: ["${WEB_PORT:-3000}:3000"]
    environment:
      INTERNAL_API_PROXY_TARGET: ${INTERNAL_API_PROXY_TARGET:-http://api:8080}
    depends_on:
      - api
    restart: unless-stopped
  api:
    build: ./api
    expose: ["8080"]
    environment:
      API_ADDRESS: ${API_ADDRESS:-:8080}
      PROCESSOR_BASE_URL: ${PROCESSOR_BASE_URL:-http://processor:8000}
    depends_on:
      - processor
    restart: unless-stopped
    volumes:
      - ./var:/app/var
  processor:
    build: ./processor
    expose: ["8000"]
    restart: unless-stopped
    volumes:
      - ./var:/app/var
